services:
  postgres:
    image: postgres:16-alpine
    container_name: tavakoli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tavakoli
      POSTGRES_PASSWORD: tavakoli
      POSTGRES_DB: tavakoli_direct
    ports:
      - '5432:5432'
    volumes:
      - tavakoli_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tavakoli -d tavakoli_direct']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tavakoli-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - tavakoli_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tavakoli_pgdata:
  tavakoli_redisdata:
